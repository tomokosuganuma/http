<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP Status Pages</title>
  <style>
    body {
      margin: 0;
      background: white;
      color: #333;
      font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
      text-align: center;
    }

    header {
      background: #303030;
      color: white;
      padding: 36px 16px;
    }

    h1 {
      margin: 0;
      font-size: 48px;
      letter-spacing: 2px;
    }

    .dummy {
      margin-top: 56px;
      font-size: 90px;
    }

    p {
      margin: 28px auto 0;
      max-width: 640px;
      font-size: 18px;
      line-height: 1.8;
      padding: 0 20px;
    }

    .links {
      margin-top: 36px;
    }

    a {
      display: inline-block;
      margin: 8px;
      padding: 12px 20px;
      border: 2px solid #303030;
      color: #303030;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
    }

    a:hover {
      background: #303030;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>HTTP Status Pages</h1>
  </header>

  <div class="dummy">🐈</div>

  <div class="links">
    <a href="403.html">403 Forbidden</a>
    <a href="404.html">404 Not Found</a>
    <a href="500.html">500 Internal Server Error</a>
  </div>
</body>
</html>
