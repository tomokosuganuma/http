<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 Forbidden</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(255, 70, 100, 0.18), transparent 35%),
        radial-gradient(circle at 70% 30%, rgba(255, 210, 80, 0.16), transparent 32%),
        #070711;
      color: #fff4f4;
      font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.7) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,103,130,0.4) 1px, transparent 1px);
      background-size: 80px 80px, 130px 130px;
      background-position: 0 0, 40px 50px;
      opacity: 0.25;
      pointer-events: none;
    }

    .gate {
      position: relative;
      width: min(820px, 100%);
      border: 2px solid rgba(255, 103, 130, 0.85);
      border-radius: 28px;
      background: rgba(26, 10, 24, 0.86);
      box-shadow: 0 0 34px rgba(255, 75, 110, 0.3);
      padding: 46px;
    }

    .gate::before {
      content: "ACCESS DENIED";
      position: absolute;
      top: 24px;
      right: 28px;
      color: rgba(255, 103, 130, 0.65);
      font-size: 13px;
      letter-spacing: 0.2em;
    }

    .label {
      color: #ff7891;
      letter-spacing: 0.18em;
      font-size: 13px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(82px, 18vw, 160px);
      line-height: 0.9;
      color: #ff7891;
      text-shadow: 0 0 18px rgba(255, 103, 130, 0.75);
    }

    h2 {
      margin: 14px 0 0;
      font-size: clamp(28px, 5vw, 48px);
    }

    p {
      margin-top: 28px;
      color: #ffd6dd;
      font-size: 18px;
      line-height: 1.8;
    }

    .warning {
      margin-top: 34px;
      padding: 18px 20px;
      border: 1px solid rgba(255, 103, 130, 0.75);
      background: rgba(255, 103, 130, 0.1);
      color: #ffe8ec;
      border-radius: 16px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="label">RESTRICTED AREA</div>

    <h1>403</h1>
    <h2>Forbidden</h2>

    <p>
      このエリアへのアクセスは制限されています。<br>
      入室には、より高い認証レベルが必要です。
    </p>

    <div class="warning">
      アクセス権限がないため、リクエストは拒否されました。
    </div>
  </main>
</body>
</html>
