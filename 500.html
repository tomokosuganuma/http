<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 Internal Server Error</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 25% 30%, rgba(70, 160, 255, 0.22), transparent 30%),
        radial-gradient(circle at 80% 75%, rgba(255, 130, 80, 0.18), transparent 32%),
        #050812;
      color: #edf7ff;
      font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.75) 1px, transparent 1px),
        radial-gradient(circle, rgba(105,180,255,0.42) 1px, transparent 1px);
      background-size: 72px 72px, 124px 124px;
      background-position: 0 0, 34px 58px;
      opacity: 0.28;
      pointer-events: none;
    }

    .system {
      position: relative;
      width: min(860px, 100%);
      display: grid;
      grid-template-columns: 150px 1fr;
      border: 1px solid rgba(105, 180, 255, 0.82);
      border-radius: 28px;
      overflow: hidden;
      background: rgba(8, 18, 42, 0.88);
      box-shadow: 0 0 34px rgba(70, 160, 255, 0.3);
    }

    .side {
      background: rgba(105, 180, 255, 0.12);
      border-right: 1px solid rgba(105, 180, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      letter-spacing: 0.22em;
      color: #69b4ff;
      font-weight: bold;
    }

    .content {
      padding: 46px;
    }

    .label {
      color: #69b4ff;
      letter-spacing: 0.18em;
      font-size: 13px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(82px, 18vw, 160px);
      line-height: 0.9;
      color: #69b4ff;
      text-shadow: 0 0 18px rgba(105, 180, 255, 0.75);
    }

    h2 {
      margin: 14px 0 0;
      font-size: clamp(26px, 5vw, 46px);
    }

    p {
      margin-top: 28px;
      color: #c4ddf2;
      font-size: 18px;
      line-height: 1.8;
    }

    .repair {
      margin-top: 34px;
      padding: 18px 20px;
      border-left: 4px solid #69b4ff;
      background: rgba(105, 180, 255, 0.1);
      color: #e5f4ff;
      line-height: 1.7;
    }

    @media (max-width: 650px) {
      .system {
        grid-template-columns: 1fr;
      }

      .side {
        writing-mode: horizontal-tb;
        padding: 16px;
        border-right: none;
        border-bottom: 1px solid rgba(105, 180, 255, 0.5);
      }
    }
  </style>
</head>
<body>
  <main class="system">
    <section class="side">SYSTEM ERROR</section>

    <section class="content">
      <div class="label">SERVER BASE MALFUNCTION</div>

      <h1>500</h1>
      <h2>Internal Server Error</h2>

      <p>
        サーバー基地の内部システムで異常が発生しました。<br>
        現在、通信処理を正常に完了できません。
      </p>

      <div class="repair">
        復旧までしばらく時間をおいてから、再度アクセスしてください。
      </div>
    </section>
  </main>
</body>
</html>
